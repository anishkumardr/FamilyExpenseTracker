<div class="update-overlay">
  <div class="update-modal">
    <div class="update-icon">
      <mat-icon>system_update</mat-icon>
    </div>
    <h2 class="update-title">Update Required</h2>
    <p class="update-message">
      A new version of the Family Expense Tracker is available.
      Please update now to continue using the app.
    </p>
    <button
      mat-raised-button
      color="primary"
      class="update-button"
      (click)="updateNow()">
      Update Now
    </button>
  </div>
</div>
