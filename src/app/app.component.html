<div class="app-shell" [class.light]="lightTheme">
      <div class="topbar">
        <div class="brand">Family Tracker</div>
        <div class="right-actions">
          <button style="display: none;" mat-icon-button aria-label="toggle theme" (click)="toggleTheme()">
            <mat-icon>{{ lightTheme ? 'dark_mode' : 'light_mode' }}</mat-icon>
          </button>
          <div class="header-bar">
            <button mat-button [matMenuTriggerFor]="userMenu" class="username-btn">
              <span class="welcome-text">Hi, {{ userName }} 👋</span>
            </button>
            <mat-menu #userMenu="matMenu" panelClass="user-menu-panel">
              <button mat-menu-item (click)="logout()">
                <span class="material-icons">logout</span>
                Logout
              </button>
            </mat-menu>
          </div>
        </div>
      </div>

      <main class="page-body">
        <router-outlet></router-outlet>
      </main>
